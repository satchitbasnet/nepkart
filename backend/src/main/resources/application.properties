# Server Configuration
server.port=8081
spring.application.name=nepkart-backend

# Default: Use Supabase (PostgreSQL) - requires backend/.env with credentials
# See backend/.env.example and README for setup
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

# JPA (common - datasource comes from postgres profile)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Session Configuration
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m

# Logging
logging.level.com.nepkart=DEBUG
logging.level.org.springframework.web=INFO
