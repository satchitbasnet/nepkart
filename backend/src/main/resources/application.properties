# Server Configuration
server.port=8081
spring.application.name=nepkart-backend

# Default: H2 (works without setup). Use run-with-postgres.ps1 for Supabase.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

# H2 Database (fallback - works when Supabase is unreachable)
spring.datasource.url=jdbc:h2:mem:nepkartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Session Configuration
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m

# Logging
logging.level.com.nepkart=DEBUG
logging.level.org.springframework.web=INFO
