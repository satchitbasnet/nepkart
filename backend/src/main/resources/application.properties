# Server Configuration (PORT is set by platforms like Render; default 8081 locally)
server.port=${PORT:8081}
spring.application.name=nepkart-backend

# Default: Supabase (PostgreSQL) - run with .\run.ps1 which loads backend/.env
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Session Configuration
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# Logging
logging.level.com.nepkart=DEBUG
logging.level.org.springframework.web=INFO

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
